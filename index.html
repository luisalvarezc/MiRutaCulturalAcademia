        };

        const LearningModule = ({ onBack }) => {
            const [step, setStep] = React.useState(1);
            const { completeActivity } = useGamification();
            const handleComplete = () => {
                completeActivity('academy_aprendizaje', 50, 'Módulo: Aprendizaje y Autodesarrollo');
                onBack();
            };
            return (
                <div className="max-w-4xl mx-auto">
                    <button onClick={onBack} className="flex items-center text-slate-500 hover:text-slate-800 mb-8 transition-colors font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-7-7a1 1 0 010-1.414l7-7a1 1 0 011.414 1.414L4.414 9H17a1 1 0 110 2H4.414l5.293 5.293a1 1 0 010 1.414z" clipRule="evenodd" /></svg> Volver a la Academia
                    </button>
                    <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
                        <div className="h-2 bg-slate-100 flex">
                            <div className={`h-full bg-amber-600 transition-all duration-500 ${step === 1 ? 'w-1/3' : step === 2 ? 'w-2/3' : 'w-full'}`}></div>
                        </div>
                        <div className="p-8 md:p-12">
                            {step === 1 && (
                                <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="p-3 bg-amber-100 rounded-2xl text-amber-600"><LearningIcon /></div>
                                        <h2 className="text-3xl font-black text-slate-900">Creciendo en Comunidad</h2>
                                    </div>
                                    <p className="text-lg text-slate-600 mb-8 leading-relaxed">En una cultura de crecimiento, el conocimiento no se guarda, se intercambia. El aprendizaje es el motor que nos mantiene a la vanguardia.</p>
                                    <button onClick={() => setStep(2)} className="w-full py-4 bg-amber-600 text-white font-bold rounded-2xl hover:bg-amber-700 transition-all shadow-lg shadow-amber-200">Explorar Biblioteca de Pasiones</button>
                                </div>
                            )}
                            {step === 2 && (
                                <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="p-3 bg-blue-100 rounded-2xl text-blue-600"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg></div>
                                        <h2 className="text-3xl font-black text-slate-900">Biblioteca de Pasiones</h2>
                                    </div>
                                    <p className="text-slate-600 mb-8">Un espacio para "colgar" y compartir recursos valiosos con la comunidad.</p>
                                    <button onClick={() => setStep(3)} className="w-full py-4 bg-amber-600 text-white font-bold rounded-2xl hover:bg-amber-700 transition-all shadow-lg shadow-amber-200">¡Ir al Reto de Autodesarrollo!</button>
                                </div>
                            )}
                            {step === 3 && (
                                <div className="animate-in fade-in slide-in-from-right-4 duration-500 text-center">
                                    <div className="inline-flex p-4 bg-amber-100 rounded-3xl text-amber-600 mb-6"><LearningIcon /></div>
                                    <h2 className="text-3xl font-black text-slate-900 mb-4">Pionero del Aprendizaje</h2>
                                    <div className="bg-slate-900 text-white p-8 rounded-[2rem] text-left mb-10 relative overflow-hidden">
                                        <h3 className="text-2xl font-bold mb-4">Réplica de Aprendizaje</h3>
                                        <ul className="space-y-4 text-slate-300">
                                            <li className="flex items-start gap-3"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-emerald-400 flex-shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg><span>Compártelo con tu equipo explicando por qué es valioso para el rol.</span></li>
                                        </ul>
                                    </div>
                                    <button onClick={handleComplete} className="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200">¡Acepto el Reto y Finalizo!</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Academy = () => {
            const [selectedModule, setSelectedModule] = React.useState(null);
            const { getBadges, points } = useGamification();
            const earnedBadgesCount = getBadges().length;
            const getLevel = (pts) => {
                if (pts >= 1000) return 'Maestro Cultural';
                if (pts >= 600) return 'Experto';
                if (pts >= 300) return 'Iniciado';
                if (pts >= 100) return 'Aprendiz';
                return 'Novato';
            };
            const modules = [
                { id: 'reconocimiento', title: 'Reconocimiento: Brillamos Juntos', description: 'Aprende a transformar logros individuales en inspiración colectiva.', icon: <RecognitionIcon />, level: 'Eje 1', duration: '5 min', color: 'bg-blue-50 border-blue-200', status: 'available' },
                { id: 'liderazgo', title: 'Liderazgo e Influencia', description: 'Domina la Rueda de Gestión Personal y el Círculo de Influencia.', icon: <LeadershipIcon />, level: 'Eje 2', duration: '8 min', color: 'bg-purple-50 border-purple-200', status: 'available' },
                { id: 'empoderamiento', title: 'Empoderamiento y Autonomía', description: 'Domina el Modelo GROW y aduéñate de tus resultados.', icon: <EmpowermentIcon />, level: 'Eje 3', duration: '7 min', color: 'bg-red-50 border-red-200', status: 'available' },
                { id: 'agilidad', title: 'Mentalidad Ágil', description: 'Aprende el Perfection Game y el Cuadrante de la Retrospectiva.', icon: <AgilityIcon />, level: 'Eje 4', duration: '6 min', color: 'bg-emerald-50 border-emerald-200', status: 'available' },
                { id: 'seguridad', title: 'Seguridad Psicológica', description: 'Crea un espacio seguro para colaborar y brillar sin temor.', icon: <PsychologicalSafetyIcon />, level: 'Eje 5', duration: '10 min', color: 'bg-teal-50 border-teal-200', status: 'available' },
                { id: 'aprendizaje', title: 'Desarrollo y Autoaprendizaje', description: 'Potencia tu crecimiento continuo y el de tu equipo.', icon: <LearningIcon />, level: 'Eje 6', duration: '8 min', color: 'bg-amber-50 border-amber-200', status: 'available' }
            ];
            if (selectedModule === 'reconocimiento') return <BrillamosJuntosModule onBack={() => setSelectedModule(null)} />;
            if (selectedModule === 'liderazgo') return <LeadershipModule onBack={() => setSelectedModule(null)} />;
            if (selectedModule === 'empoderamiento') return <EmpowermentModule onBack={() => setSelectedModule(null)} />;
            if (selectedModule === 'agilidad') return <AgilityModule onBack={() => setSelectedModule(null)} />;
            if (selectedModule === 'seguridad') return <PsychologicalSafetyModule onBack={() => setSelectedModule(null)} />;
            if (selectedModule === 'aprendizaje') return <LearningModule onBack={() => setSelectedModule(null)} />;
            return (
                <div className="max-w-6xl mx-auto">
                    <header className="mb-12 text-center">
                        <div className="inline-flex items-center justify-center p-3 bg-blue-100 rounded-2xl mb-4"><AcademyIcon /></div>
                        <h1 className="text-4xl font-black text-slate-900 tracking-tight">Academia de Transformación</h1>
                        <p className="mt-4 text-xl text-slate-600 max-w-2xl mx-auto">Convierte la teoría en acción. Micro-módulos diseñados para dominar nuestra cultura en minutos.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {modules.map((module, index) => (
                            <div key={module.id} className={`relative p-6 rounded-3xl border-2 transition-all ${module.color} cursor-pointer hover:shadow-xl hover:-translate-y-1`} onClick={() => setSelectedModule(module.id)}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className="p-3 bg-white rounded-2xl shadow-sm">{module.icon}</div>
                                    <span className="text-xs font-bold uppercase tracking-wider px-3 py-1 rounded-full bg-blue-600 text-white">{module.level}</span>
                                </div>
                                <h3 className="text-xl font-bold text-slate-900 mb-2">{module.title}</h3>
                                <p className="text-slate-600 mb-6">{module.description}</p>
                                <div className="flex items-center justify-between mt-auto">
                                    <div className="flex items-center text-sm text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>{module.duration}</div>
                                    <div className="flex items-center text-blue-600 font-bold">Empezar <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clipRule="evenodd" /></svg></div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <section className="mt-20 p-8 bg-slate-900 rounded-[2.5rem] text-white overflow-hidden relative">
                        <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                            <div className="max-w-md">
                                <h2 className="text-3xl font-bold mb-4">Tu Progreso de Maestría</h2>
                                <p className="text-slate-400 mb-6">Completa los módulos para ganar insignias exclusivas y puntos para tu Ruta Cultural.</p>
                                <div className="flex gap-4">
                                    <div className="flex flex-col items-center">
                                        <div className="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center mb-2 border border-white/20"><AwardIcon /></div>
                                        <span className="text-xs font-medium">Insignias: {earnedBadgesCount}</span>
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <div className="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center mb-2 border border-white/20"><TargetIcon /></div>
                                        <span className="text-xs font-medium">Nivel: {getLevel(points)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="absolute -right-20 -bottom-20 w-64 h-64 bg-blue-600 rounded-full blur-[100px] opacity-20"></div>
                    </section>
                </div>
            );
        };

        const App = () => {
            const { userName, showOnboarding } = useAuth();
            const { celebration, clearCelebration } = useGamification();
            const [currentView, setCurrentView] = useState('home');
            const handleNavigate = (view) => { setCurrentView(view); window.scrollTo(0, 0); };
            const currentPillar = useMemo(() => (currentView !== 'home' && currentView !== 'dashboard' && currentView !== 'academy' && currentView !== 'resources' && currentView !== 'glossary') ? pillarsData.find(p => p.id === currentView) : undefined, [currentView]);

            const Onboarding = () => {
                const { completeOnboarding } = useAuth();
                const [step, setStep] = useState(0);
                const [highlightStyle, setHighlightStyle] = useState({});
                const [tooltipStyle, setTooltipStyle] = useState({ top: '50%', left: '50%', transform: 'translate(-50%, -50%)', right: 'auto' });
                const steps = useMemo(() => [{ title: '¡Bienvenido/a a tu Ruta Cultural!', content: 'Este es un viaje para construir juntos la cultura que deseamos en el BCCR. Permítenos mostrarte cómo funciona.', targetId: null, }, { title: 'Los Seis Ejes Culturales', content: 'Estos son los pilares de nuestra transformación. Haz clic en cada uno para explorar sus comportamientos y actividades.', targetId: 'onboarding-pillars', }, { title: 'Tu Progreso', content: 'Aquí verás los puntos que ganas al completar actividades. ¡Cada punto cuenta para la transformación!', targetId: 'onboarding-points', }, { title: 'Tus Metas Personales', content: 'Además de las actividades sugeridas, puedes establecer tus propios objetivos para crecer y alinearte con la nueva cultura.', targetId: 'onboarding-goals', }, { title: '¡Todo Listo!', content: 'Ya estás listo para comenzar tu ruta. ¡Explora, participa y sé protagonista del cambio!', targetId: null, }], []);
                useEffect(() => { const update = () => { const s = steps[step]; const e = s.targetId ? document.getElementById(s.targetId) : null; if(e){ const r = e.getBoundingClientRect(); if(r.width>0||r.height>0){ setHighlightStyle({width:`${r.width+20}px`,height:`${r.height+20}px`,top:`${r.top-10}px`,left:`${r.left-10}px`}); setTooltipStyle({top:`${r.bottom+15}px`,left:'50%',transform:'translateX(-50%)',right:'auto'}); } else { setHighlightStyle({}); setTooltipStyle({top:'50%',left:'50%',transform:'translate(-50%, -50%)',right:'auto'}); } } else { setHighlightStyle({}); setTooltipStyle({top:'50%',left:'50%',transform:'translate(-50%, -50%)',right:'auto'}); } }; const t = setTimeout(update, 450); return () => clearTimeout(t); }, [step, steps]);
                const handleNext = () => (step < steps.length - 1) ? setStep(s => s + 1) : completeOnboarding();
                const handlePrev = () => (step > 0) ? setStep(s => s - 1) : undefined;
                return (<div className="fixed inset-0 z-50"><div className="onboarding-highlight" style={highlightStyle}></div><div className="onboarding-tooltip" style={tooltipStyle}><h3 className="text-xl font-bold text-slate-800">{steps[step].title}</h3><p className="mt-2 text-slate-600">{steps[step].content}</p><div className="mt-6 flex justify-between items-center"><span className="text-sm text-slate-500">{step + 1} / {steps.length}</span><div>{step > 0 && <button onClick={handlePrev} className="text-sm font-semibold text-slate-600 px-4 py-2 rounded-md hover:bg-slate-100">Anterior</button>}<button onClick={handleNext} className="bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">{step === steps.length - 1 ? 'Finalizar Tour' : 'Siguiente'}</button></div></div></div></div>);
            };
            const Confetti = () => { const [p, setP] = useState([]); useEffect(() => { const c = ['#3B82F6', '#8B5CF6', '#10B981', '#F59E0B', '#EF4444', '#14B8A6']; setP(Array.from({ length: 100 }).map((_, i) => <div key={i} className="confetti" style={{left:`${Math.random()*100}%`, backgroundColor:c[Math.floor(Math.random()*c.length)], animationDelay:`${Math.random()*4}s`, transform:`rotate(${Math.random()*360}deg)`}}></div>)); }, []); return <div className="confetti-container">{p}</div>; };
            const CelebrationModal = ({ celebration, onClose }) => { const { type, data } = celebration; const isBadge = type === 'badge'; return (<div className="fixed inset-0 bg-slate-800/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose} role="dialog"><Confetti /><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg text-center p-8 md:p-12 transform transition-all scale-100" onClick={e => e.stopPropagation()}><h2 className="text-3xl md:text-4xl font-extrabold text-slate-800">¡Felicidades!</h2>{isBadge ? (<><p className="mt-3 text-lg text-slate-600">¡Has obtenido una nueva insignia!</p><div className={`mt-6 inline-flex flex-col items-center justify-center p-6 rounded-xl ${data.colorClasses}`}><div className={data.iconColorClasses}>{cloneElement(data.icon, {className: "h-16 w-16"})}</div><h3 className="mt-4 text-2xl font-bold">{data.name}</h3><p className="mt-1 opacity-90">{data.description}</p></div></>) : (<><p className="mt-3 text-lg text-slate-600">Completaste una actividad y ganaste puntos:</p><div className="mt-6 bg-yellow-100 text-yellow-800 inline-flex flex-col items-center justify-center p-6 rounded-xl"><h3 className="text-xl font-bold">{data.title}</h3><p className="mt-2 text-3xl font-extrabold">+{data.points} Puntos</p></div></>)}<button onClick={onClose} className="mt-8 bg-slate-800 text-white font-bold py-3 px-6 rounded-lg hover:bg-slate-700 transition-colors w-full sm:w-auto">¡Genial!</button></div></div>); };

            if (!userName) return <Login />;

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <Header onNavigate={handleNavigate} currentView={currentView} />
                    <main key={currentView} className="flex-grow container mx-auto px-4 py-8 md:py-12 content-fade-in">
                        {currentView === 'home' && <Home onNavigate={handleNavigate} />}
                        {currentView === 'dashboard' && <Dashboard onNavigate={handleNavigate} />}
                        {currentView === 'academy' && <Academy />}
                        {currentView === 'resources' && <Resources />}
                        {currentView === 'glossary' && <Glossary />}
                        {currentPillar && <PillarPage pillar={currentPillar} />}
                    </main>
                    <footer className="bg-slate-800 text-white py-6 text-center">
                        <p>&copy; {new Date().getFullYear()} Banco Central de Costa Rica. Todos los derechos reservados.</p>
                        <p className="text-sm text-slate-400 mt-1">Impulsando nuestra cultura, juntos.</p>
                    </footer>
                    {showOnboarding && <Onboarding />}
                    {celebration && <CelebrationModal celebration={celebration} onClose={clearCelebration} />}
                </div>
            );
        };

        // --- INDEX.TSX (Entry Point) ---
        const rootElement = document.getElementById('root');
        if (!rootElement) throw new Error("Could not find root element");
        const root = ReactDOM.createRoot(rootElement);
        root.render(
            <StrictMode>
                <AuthProvider>
                    <GamificationProvider>
                        <App />
                    </GamificationProvider>
                </AuthProvider>
            </StrictMode>
        );
    </script>
</body>
</html>
