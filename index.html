        // --- CONTEXT/GAMIFICATIONCONTEXT.TSX ---
        const GamificationContext = createContext(undefined);
        const getWeekNumber = (date) => {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d.getTime() - yearStart.getTime()) / 86400000) + 1) / 7);
            return [d.getUTCFullYear(), weekNo];
        };
        const GamificationProvider = ({ children }) => {
            const [points, setPoints] = useState(() => JSON.parse(localStorage.getItem('gamification-points') || '0'));
            const [completedActivities, setCompletedActivities] = useState(() => new Set(JSON.parse(localStorage.getItem('gamification-completed') || '[]')));
            const [badges, setBadges] = useState(() => new Set(JSON.parse(localStorage.getItem('gamification-badges') || '[]')));
            const [celebration, setCelebration] = useState(null);
            const [streakData, setStreakData] = useState(() => {
                const saved = localStorage.getItem('gamification-streak');
                return saved ? JSON.parse(saved) : { count: 0, lastCompletion: 0 };
            });

            useEffect(() => { localStorage.setItem('gamification-points', JSON.stringify(points)); }, [points]);
            useEffect(() => { localStorage.setItem('gamification-completed', JSON.stringify(Array.from(completedActivities))); }, [completedActivities]);
            useEffect(() => { localStorage.setItem('gamification-badges', JSON.stringify(Array.from(badges))); }, [badges]);
            useEffect(() => { localStorage.setItem('gamification-streak', JSON.stringify(streakData)); }, [streakData]);

            useEffect(() => {
                const awardedBadges = new Set();
                if (completedActivities.size > 0) {
                    awardedBadges.add('first_activity');
                }
                const completedPillars = new Set();
                pillarsData.forEach(pillar => {
                    const pillarActivities = new Set(pillar.activities.map(a => a.id));
                    if (pillar.activities.length > 0 && [...pillarActivities].every(id => completedActivities.has(id))) {
                        awardedBadges.add(`pillar_${pillar.id}`);
                        completedPillars.add(pillar.id);
                    }
                });
                if (completedPillars.size === pillarsData.length) {
                    awardedBadges.add('all_pillars');
                }
                
                // Add Academy badges
                Object.keys(BADGES).forEach(badgeId => {
                    if (badgeId.startsWith('academy_') && completedActivities.has(badgeId)) {
                        awardedBadges.add(badgeId);
                    }
                });
                
                const newBadges = [...awardedBadges].filter(id => !badges.has(id));
                if (newBadges.length > 0) {
                    const badgeOrder = Object.keys(BADGES);
                    newBadges.sort((a, b) => badgeOrder.indexOf(a) - badgeOrder.indexOf(b));
                    const badgeToCelebrateId = newBadges[newBadges.length - 1];
                    const badgeInfo = BADGES[badgeToCelebrateId];
                    if (badgeInfo) {
                        setTimeout(() => setCelebration({ type: 'badge', data: badgeInfo }), 700);
                    }
                }

                if (badges.size !== awardedBadges.size || ![...badges].every(id => awardedBadges.has(id))) {
                    setBadges(awardedBadges);
                }
            }, [completedActivities, badges]);

            const addPoints = useCallback((amount) => {
                setPoints(prev => Number(prev) + Number(amount));
            }, []);

            const completeActivity = useCallback((activityId, activityPoints, activityTitle) => {
                if (completedActivities.has(activityId)) return;
                addPoints(activityPoints);
                setCompletedActivities(prev => new Set(prev).add(activityId));
                setCelebration({ type: 'activity', data: { title: activityTitle, points: activityPoints } });
                
                setStreakData(prevStreak => {
                    const now = Date.now();
                    if (prevStreak.lastCompletion === 0) return { count: 1, lastCompletion: now };
                    const [currentYear, currentWeek] = getWeekNumber(new Date());
                    const [lastYear, lastWeek] = getWeekNumber(new Date(prevStreak.lastCompletion));
                    if (currentYear === lastYear && currentWeek === lastWeek) return prevStreak;
                    const isConsecutive = (currentYear === lastYear && currentWeek === lastWeek + 1) || (currentYear === lastYear + 1 && currentWeek === 1 && (lastWeek === 52 || lastWeek === 53));
                    return isConsecutive ? { count: prevStreak.count + 1, lastCompletion: now } : { count: 1, lastCompletion: now };
                });
            }, [completedActivities, addPoints]);

            const clearCelebration = useCallback(() => setCelebration(null), []);
            
            const getBadges = useCallback(() => {
                const badgeOrder = Object.keys(BADGES);
                return Array.from(badges)
                    .map(id => BADGES[id])
                    .filter(Boolean)
                    .sort((a, b) => badgeOrder.indexOf(a.id) - badgeOrder.indexOf(b.id));
            }, [badges]);
            
            const value = useMemo(() => ({
                points, completedActivities, badges, streak: streakData.count, addPoints, completeActivity, getBadges, celebration, clearCelebration,
            }), [points, completedActivities, badges, streakData.count, addPoints, completeActivity, getBadges, celebration, clearCelebration]);

            return <GamificationContext.Provider value={value}>{children}</GamificationContext.Provider>;
        };
        const useGamification = () => useContext(GamificationContext);

        // --- COMPONENTS/PERSONALGOALS.TSX ---
        const GoalModal = ({ goal, onSave, onClose }) => {
            const [title, setTitle] = useState(goal?.title || '');
            const [date, setDate] = useState(goal?.date || '');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                onSave({ id: goal?.id, title, date });
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true">
                    <div className="bg-white rounded-lg shadow-xl w-full max-w-md">
                        <form onSubmit={handleSubmit}>
                            <div className="p-6">
                                <h3 className="text-lg font-bold text-slate-800">{goal?.id ? 'Editar Objetivo' : 'Nuevo Objetivo Personal'}</h3>
                                <div className="mt-4 space-y-4">
                                    <div>
                                        <label htmlFor="goal-title" className="block text-sm font-medium text-slate-700">Objetivo</label>
                                        <input id="goal-title" type="text" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Ej: Mejorar mi liderazgo" className="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" required autoFocus />
                                    </div>
                                    <div>
                                        <label htmlFor="goal-date" className="block text-sm font-medium text-slate-700">Fecha Límite (Opcional)</label>
                                        <input id="goal-date" type="date" value={date} onChange={(e) => setDate(e.target.value)} className="mt-1 block w-full px-3 py-2 bg-white border border-slate-300 rounded-md text-sm shadow-sm" />
                                    </div>
                                </div>
                            </div>
                            <div className="bg-slate-50 px-6 py-3 flex justify-end space-x-3">
                                <button type="button" onClick={onClose} className="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-md shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Cancelar</button>
                                <button type="submit" className="px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };
        const GoalItem = ({ goal, onToggle, onEdit, onDelete }) => (
            <div className={`p-4 rounded-lg flex items-center gap-4 transition-all duration-300 ${goal.completed ? 'bg-slate-100 opacity-70' : 'bg-blue-50/70'}`}>
                <input type="checkbox" checked={goal.completed} onChange={() => onToggle(goal.id)} aria-labelledby={`goal-title-${goal.id}`} className="h-6 w-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer flex-shrink-0" />
                <div className="flex-grow">
                    <p id={`goal-title-${goal.id}`} className={`font-medium text-slate-800 ${goal.completed ? 'line-through text-slate-500' : ''}`}>{goal.title}</p>
                    {goal.date && <p className={`text-sm ${goal.completed ? 'text-slate-400' : 'text-slate-500'}`}>Fecha límite: {new Date(goal.date + 'T00:00:00').toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' })}</p>}
                </div>
                <div className="flex-shrink-0 flex items-center space-x-2">
                    <button onClick={() => onEdit(goal)} className="p-2 text-slate-500 hover:text-blue-600 hover:bg-slate-200 rounded-full transition-colors" aria-label={`Editar objetivo: ${goal.title}`}><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z" /><path fillRule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clipRule="evenodd" /></svg></button>
                    <button onClick={() => onDelete(goal.id)} className="p-2 text-slate-500 hover:text-red-600 hover:bg-slate-200 rounded-full transition-colors" aria-label={`Eliminar objetivo: ${goal.title}`}><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm4 0a1 1 0 012 0v6a1 1 0 11-2 0V8z" clipRule="evenodd" /></svg></button>
                </div>
            </div>
        );
        const PersonalGoals = () => {
            const [goals, setGoals] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingGoal, setEditingGoal] = useState(null);

            useEffect(() => { try { const s = localStorage.getItem('bccr-culture-goals'); if (s) setGoals(JSON.parse(s)); } catch (e) { console.error(e); } }, []);
            useEffect(() => { try { localStorage.setItem('bccr-culture-goals', JSON.stringify(goals)); } catch (e) { console.error(e); } }, [goals]);

            const handleSaveGoal = (goalData) => {
                if (goalData.id) {
                    setGoals(goals.map(g => g.id === goalData.id ? { ...g, title: goalData.title, date: goalData.date } : g));
                } else {
                    setGoals([{ id: new Date().toISOString(), title: goalData.title, date: goalData.date, completed: false }, ...goals]);
                }
                setIsModalOpen(false); setEditingGoal(null);
            };
            const handleToggleComplete = (id) => {
                const goal = goals.find(g => g.id === id);
                if (goal && !goal.completed && !window.confirm('¿Está seguro que quiere marcar este objetivo como completo?')) return;
                setGoals(goals.map(g => (g.id === id ? { ...g, completed: !g.completed } : g)));
            };
            const handleDeleteGoal = (id) => { if (window.confirm('¿Estás seguro de que quieres eliminar este objetivo?')) setGoals(goals.filter(g => g.id !== id)); };
            const openAddModal = () => { setEditingGoal(null); setIsModalOpen(true); };
            const openEditModal = (goal) => { setEditingGoal(goal); setIsModalOpen(true); };

            const { completedGoals, activeGoals } = useMemo(() => ({
                completedGoals: goals.filter(g => g.completed).sort((a,b) => (a.date || 'z').localeCompare(b.date || 'z')),
                activeGoals: goals.filter(g => !g.completed).sort((a,b) => (a.date || 'z').localeCompare(b.date || 'z')),
            }), [goals]);

            return (
                <section id="onboarding-goals" className="bg-white p-6 md:p-8 rounded-xl shadow-md">
                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                        <h2 className="text-3xl font-bold text-slate-800">Mis Objetivos de Cultura</h2>
                        <button onClick={openAddModal} className="inline-flex items-center justify-center space-x-2 bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clipRule="evenodd" /></svg>
                            <span>Agregar Objetivo</span>

                    </div>

                        {goals.length === 0 ? (

                            <div className="space-y-4">
                                {activeGoals.map(goal => <GoalItem key={goal.id} goal={goal} onToggle={handleToggleComplete} onEdit={openEditModal} onDelete={handleDeleteGoal} />)}
                                {completedGoals.length > 0 && activeGoals.length > 0 && <hr className="my-6 border-slate-200" />}
                                {completedGoals.map(goal => <GoalItem key={goal.id} goal={goal} onToggle={handleToggleComplete} onEdit={openEditModal} onDelete={handleDeleteGoal} />)}
                            </div>
                        )}
                    </div>
                    {isModalOpen && <GoalModal goal={editingGoal} onSave={handleSaveGoal} onClose={() => setIsModalOpen(false)} />}
                </section>
            );
        };
        
        // --- COMPONENTS/PILLARCARD.TSX ---
        const PillarCard = ({ pillar, onClick }) => (
            <div onClick={onClick} className="bg-white rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 cursor-pointer overflow-hidden group">
              <div className={`p-6 flex items-center space-x-5 border-l-8 ${pillar.color.replace('text', 'border')}`}>
                <div className={`flex-shrink-0 p-3 bg-slate-100 rounded-full ${pillar.color} group-hover:scale-110 transition-transform duration-300`}>{pillar.icon}</div>
                <div><h3 className="text-xl font-bold text-slate-800">{pillar.title}</h3><p className="text-slate-500 mt-1">{pillar.description}</p></div>
              </div>
              <div className={`bg-slate-50 px-6 py-3 text-right`}><span className="text-sm font-semibold text-slate-600 group-hover:text-slate-900 transition-colors">Explorar Eje &rarr;</span></div>
            </div>
        );

        // --- COMPONENTS/ACTIVITYCARD.TSX ---
        const ActivityCard = ({ activity, pillarId, pillarColor }) => {
            const { completeActivity, completedActivities } = useGamification();
            const isCompleted = completedActivities.has(activity.id);
            const typeStyles = {
                interactive: { icon: <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z" /><path fillRule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.022 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clipRule="evenodd" /></svg>, text: 'Interactivo' },
                practice: { icon: <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.5 2a.5.5 0 00-.5.5v15a.5.5 0 00.5.5h13a.5.5 0 00.5-.5V5.414a.5.5 0 00-.146-.354l-3-3A.5.5 0 0013.586 2H3.5zm4 5.5a.5.5 0 01.5-.5h4a.5.5 0 010 1h-4a.5.5 0 01-.5-.5zm0 2a.5.5 0 01.5-.5h4a.5.5 0 010 1h-4a.5.5 0 01-.5-.5zm0 2a.5.5 0 01.5-.5h4a.5.5 0 010 1h-4a.5.5 0 01-.5-.5z" clipRule="evenodd" /></svg>, text: 'Práctica' },
                group: { icon: <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" /></svg>, text: 'Grupal' },
                reading: { icon: <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z" /></svg>, text: 'Lectura' },
            };
            const { icon, text } = typeStyles[activity.type];
            return (
                <div className={`bg-white rounded-lg shadow-md overflow-hidden transition-all duration-300 ${isCompleted ? 'ring-2 ring-green-500' : 'hover:shadow-xl'}`}>
                    <div className="p-6">
                        <div className="flex justify-between items-start">
                            <h4 className="text-xl font-bold text-slate-900 pr-4">{activity.title}</h4>
                            <div className="flex-shrink-0 flex items-center bg-yellow-100 text-yellow-800 text-xs font-bold px-2.5 py-1 rounded-full">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                {activity.points} Puntos
                            </div>
                        </div>
                        <div className="mt-2 flex items-center space-x-1 text-sm text-gray-500">{icon}<span>{text}</span></div>
                        <p className="mt-4 text-slate-600">{activity.description}</p>
                        {activity.interactiveElement && <div className="mt-4 p-4 bg-slate-50 rounded-md border border-slate-200">{activity.interactiveElement}</div>}
                    </div>
                    <div className="bg-slate-50 px-6 py-4">
                        <button onClick={() => completeActivity(activity.id, activity.points, activity.title)} disabled={isCompleted} className={`w-full font-bold py-2 px-4 rounded-md transition-all duration-300 flex items-center justify-center space-x-2 ${isCompleted ? 'bg-green-500 text-white cursor-not-allowed' : 'bg-white text-slate-700 ring-2 ring-slate-300 hover:ring-slate-400 hover:bg-slate-100'}`}>
                            {isCompleted ? (<><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg><span>Completado</span></>) : (<span>Marcar como Completado</span>)}
                        </button>
                    </div>
                </div>
            );
        };
        
        // --- COMPONENTS/HEADER.TSX ---
        const NavLink = ({ onClick, isActive, children, isMobile = false }) => (
            <button onClick={onClick} className={`transition-colors duration-200 ${isMobile ? 'block w-full text-left px-3 py-3 rounded-md text-base font-medium' : 'px-3 py-2 rounded-md text-sm font-medium'} ${isActive ? 'bg-slate-900 text-white' : 'text-slate-300 hover:bg-slate-700 hover:text-white'}`}>
                {children}
            </button>
        );
        const Header = ({ onNavigate, currentView }) => {
            const { points, streak } = useGamification();
            const { userName, logout } = useAuth();
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const handleNav = (view) => { onNavigate(view); setIsMenuOpen(false); };
            return (
                <header className="bg-slate-800 shadow-md sticky top-0 z-50">
                    <nav className="container mx-auto px-4">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex items-center">
                                <div className="flex-shrink-0 text-white font-bold text-lg cursor-pointer" onClick={() => handleNav('home')}>BCCR Cultura</div>
                                <div className="hidden md:block">
                                    <div className="ml-10 flex items-baseline space-x-4">
                                       <NavLink onClick={() => handleNav('home')} isActive={currentView === 'home'}>Inicio</NavLink>
                                       <NavLink onClick={() => handleNav('dashboard')} isActive={currentView === 'dashboard'}>Mi Ruta Cultural</NavLink>
                                       <NavLink onClick={() => handleNav('academy')} isActive={currentView === 'academy'}>Academia</NavLink>
                                       <NavLink onClick={() => handleNav('glossary')} isActive={currentView === 'glossary'}>Glosario</NavLink>
                                       <NavLink onClick={() => handleNav('resources')} isActive={currentView === 'resources'}>Recursos</NavLink>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                 <div className="hidden md:flex items-center text-slate-300">
                                     <span>Hola, {userName}</span>
                                     <button onClick={logout} title="Cerrar sesión" className="ml-3 text-slate-400 hover:text-white transition-colors"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clipRule="evenodd" /></svg></button>
                                 </div>
                                 <div className="flex items-center space-x-3">
                                    {streak > 0 && <div className="text-orange-400 font-bold flex items-center" title={`Racha de ${streak} semana(s) completando actividades.`}><span className="text-lg">🔥</span><span>{streak}</span></div>}
                                     <div id="onboarding-points" className="text-yellow-400 font-bold flex items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                        <span>{points} Puntos</span>
                                    </div>
                                </div>
                                <div className="md:hidden flex items-center">
                                     <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="inline-flex items-center justify-center p-2 rounded-md text-slate-300 hover:text-white hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white" aria-controls="mobile-menu" aria-expanded={isMenuOpen}>
                                        <span className="sr-only">Abrir menú</span>
                                        {isMenuOpen ? <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg> : <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" /></svg>}
                                     </button>
                                </div>
                            </div>
                        </div>
                         {isMenuOpen && (
                            <div className="md:hidden" id="mobile-menu">
                                <div className="px-2 pt-2 pb-3 space-y-2 sm:px-3">
                                    <NavLink onClick={() => handleNav('home')} isActive={currentView === 'home'} isMobile={true}>Inicio</NavLink>
                                    <NavLink onClick={() => handleNav('dashboard')} isActive={currentView === 'dashboard'} isMobile={true}>Mi Ruta Cultural</NavLink>
                                    <NavLink onClick={() => handleNav('academy')} isActive={currentView === 'academy'} isMobile={true}>Academia</NavLink>
                                    <NavLink onClick={() => handleNav('glossary')} isActive={currentView === 'glossary'} isMobile={true}>Glosario</NavLink>
                                    <NavLink onClick={() => handleNav('resources')} isActive={currentView === 'resources'} isMobile={true}>Recursos</NavLink>
                                </div>
                                <div className="pt-4 pb-3 border-t border-slate-700">
                                     <div className="flex items-center justify-between px-3">
                                        <span className="text-white font-medium">Hola, {userName}</span>
                                        <button onClick={logout} title="Cerrar Sesión" className="flex-shrink-0 bg-slate-700 p-2 rounded-full text-slate-300 hover:text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-white">
                                            <span className="sr-only">Cerrar Sesión</span>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clipRule="evenodd" /></svg>
                                        </button>
                                     </div>
                                </div>
                            </div>
                         )}
                    </nav>
                </header>
            );
        };
        
        // --- VIEWS ---
        const Login = () => {
            const [name, setName] = useState('');
            const [division, setDivision] = useState('');
            const [email, setEmail] = useState('');
            const { login } = useAuth();
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim() && division.trim() && email.trim()) login(name, division, email); };
            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                    <div className="w-full max-w-md text-center bg-white p-8 md:p-12 rounded-2xl shadow-xl">
                        <h1 className="text-3xl md:text-4xl font-extrabold text-slate-800">¡Bienvenido/a a la <span className="text-blue-600">Ruta Cultural</span>!</h1>
                        <p className="mt-4 text-slate-600">Introduce tus datos para personalizar tu experiencia y guardar tu progreso.</p>
                        <form onSubmit={handleSubmit} className="mt-8 space-y-4">
                            <input id="name-input" type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Escribe tu nombre aquí" required className="w-full p-3 text-lg border-2 border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" autoFocus />
                            <input id="email-input" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Tu correo electrónico" required className="w-full p-3 text-lg border-2 border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
                            <input id="division-input" type="text" value={division} onChange={(e) => setDivision(e.target.value)} placeholder="Tu División o Departamento" required className="w-full p-3 text-lg border-2 border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" />
                            <button type="submit" disabled={!name.trim() || !division.trim() || !email.trim()} className="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-lg text-lg hover:bg-blue-700 transition-colors disabled:bg-slate-400 disabled:cursor-not-allowed">Comenzar mi ruta</button>
                        </form>
                        <p className="mt-6 text-xs text-slate-400">Tus datos y progreso se guardarán únicamente en este navegador.</p>
                    </div>
                </div>
            );
        };
        const Home = ({ onNavigate }) => (
            <div className="space-y-12">
                <section className="text-center bg-white p-8 md:p-12 rounded-xl shadow-md">
                    <h1 className="text-4xl md:text-5xl font-extrabold text-slate-800">Nuestra Ruta de <span className="text-blue-600">Transformación Cultural</span></h1>
                    <p className="mt-4 max-w-3xl mx-auto text-lg text-slate-600">Basado en el diagnóstico del <strong className="font-semibold">Barrett Values Centre</strong>, iniciamos un viaje para reducir la entropía (jerarquía, burocracia, silos) y construir juntos la cultura que deseamos en el BCCR.</p>
                    <p className="mt-6 text-md font-semibold text-purple-700">¡Explora los ejes, participa en las actividades y sé protagonista del cambio!</p>
                </section>
                <PersonalGoals />
                <section className="bg-slate-900 text-white p-8 md:p-12 rounded-[2.5rem] relative overflow-hidden">
                    <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                        <div className="max-w-xl">
                            <h2 className="text-3xl font-bold mb-4">Academia de Transformación</h2>
                            <p className="text-slate-400 text-lg mb-6">¿Quieres dominar los ejes culturales en minutos? Ingresa a nuestra academia y completa los micro-módulos interactivos.</p>
                            <button onClick={() => onNavigate('academy')} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-2xl transition-all shadow-lg shadow-blue-900/20 flex items-center gap-2">
                                <AcademyIcon className="h-5 w-5" />
                                Ir a la Academia
                            </button>
                        </div>
                        <div className="hidden md:block">
                            <div className="w-32 h-32 bg-blue-600/20 rounded-full flex items-center justify-center border border-blue-500/30 animate-pulse">
                                <AcademyIcon className="h-16 w-16 text-blue-400" />
                            </div>
                        </div>
                    </div>
                    <div className="absolute -right-20 -bottom-20 w-64 h-64 bg-blue-600 rounded-full blur-[100px] opacity-20"></div>
                </section>
                <section>
                    <h2 className="text-3xl font-bold text-center text-slate-800 mb-8">Los Seis Ejes Culturales</h2>
                    <div id="onboarding-pillars" className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {pillarsData.map((pillar) => <PillarCard key={pillar.id} pillar={pillar} onClick={() => onNavigate(pillar.id)} />)}
                    </div>
                </section>
            </div>
        );
        const PillarPage = ({ pillar }) => (
            <div className="space-y-12">
                <header className={`bg-white p-8 rounded-xl shadow-md border-t-8 ${pillar.color.replace('text', 'border')}`}>
                    <div className="flex flex-col md:flex-row items-center gap-6">
                        <div className={`flex-shrink-0 p-4 rounded-full bg-slate-100 ${pillar.color}`}>{cloneElement(pillar.icon, { className: "h-12 w-12" })}</div>
                        <div><h1 className={`text-4xl font-extrabold ${pillar.color}`}>{pillar.title}</h1><p className="mt-2 text-lg text-slate-600">{pillar.longDescription}</p></div>
                    </div>
                </header>
                <section>
                    <h2 className="text-2xl font-bold text-slate-800 mb-4">Comportamientos Clave</h2>
                    <ul className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {pillar.behaviors.map((b, i) => <li key={i} className="bg-white p-4 rounded-lg shadow-sm flex items-start space-x-3"><svg className={`flex-shrink-0 h-6 w-6 ${pillar.color}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg><span className="text-slate-700">{b}</span></li>)}
                    </ul>
                </section>
                <section>
                    <h2 className="text-3xl font-bold text-slate-800 mb-8">Actividades y Prácticas Sugeridas</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {pillar.activities.map((a) => <ActivityCard key={a.id} activity={a} pillarId={pillar.id} pillarColor={pillar.color} />)}
                    </div>
                </section>
            </div>
        );
        const Dashboard = ({ onNavigate }) => {
            const { points, completedActivities, getBadges } = useGamification();
            const { userName, division, email, logout } = useAuth();
            const [isSending, setIsSending] = useState(false);
            const earnedBadges = getBadges();
            const earnedBadgeIds = new Set(earnedBadges.map(b => b.id));

            const handleGenerateBackup = () => {
                try {
                    const data = { userName: localStorage.getItem('bccr-user-name'), division: localStorage.getItem('bccr-user-division'), email: localStorage.getItem('bccr-user-email'), points: JSON.parse(localStorage.getItem('gamification-points') || '0'), completedActivities: JSON.parse(localStorage.getItem('gamification-completed') || '[]'), badges: JSON.parse(localStorage.getItem('gamification-badges') || '[]'), goals: JSON.parse(localStorage.getItem('bccr-culture-goals') || '[]'), kudos: JSON.parse(localStorage.getItem('kudos-board') || '[]'), };
                    const backupObject = { appId: 'bccr-cultura-2024', version: '1.2', timestamp: new Date().toISOString(), data };
                    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(backupObject))));
                    const blob = new Blob([encoded], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Respaldo_Cultura_BCCR_${userName}_${new Date().toISOString().split('T')[0]}.txt`;
                    link.click();
                    URL.revokeObjectURL(url);
                } catch (e) { alert("Error al generar el respaldo."); }
            };
            
            const handleRestoreFromFile = (event) => {
                const file = event.target.files?.[0];
                if (!file || !window.confirm('¿Estás seguro? Se sobreescribirá todo tu progreso actual.')) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const decoded = decodeURIComponent(escape(atob(e.target.result)));
                        const imported = JSON.parse(decoded);
                        if (imported.appId !== 'bccr-cultura-2024' || !imported.data) throw new Error("Archivo no válido.");
                        const { userName, division, email, points, completedActivities, badges, goals, kudos } = imported.data;
                        localStorage.setItem('bccr-user-name', userName || '');
                        localStorage.setItem('bccr-user-division', division || '');
                        localStorage.setItem('bccr-user-email', email || '');
                        localStorage.setItem('gamification-points', JSON.stringify(points || 0));
                        localStorage.setItem('gamification-completed', JSON.stringify(completedActivities || []));
                        localStorage.setItem('gamification-badges', JSON.stringify(badges || []));
                        localStorage.setItem('bccr-culture-goals', JSON.stringify(goals || []));
                        localStorage.setItem('kudos-board', JSON.stringify(kudos || []));
                        alert("Progreso restaurado. La página se recargará.");
                        window.location.reload();
                    } catch (err) { alert('No se pudo restaurar. Error: ' + err.message); }
                };
                reader.readAsText(file);
            };

            const handleSendBackupToPA = async () => {
                if (!window.confirm('¿Deseas enviar una copia de tu respaldo al BCCR?')) return;
                setIsSending(true);
                try {
                    const data = { userName: localStorage.getItem('bccr-user-name'), division: localStorage.getItem('bccr-user-division'), email: localStorage.getItem('bccr-user-email'), points: JSON.parse(localStorage.getItem('gamification-points') || '0'), completedActivities: JSON.parse(localStorage.getItem('gamification-completed') || '[]'), badges: JSON.parse(localStorage.getItem('gamification-badges') || '[]'), goals: JSON.parse(localStorage.getItem('bccr-culture-goals') || '[]'), kudos: JSON.parse(localStorage.getItem('kudos-board') || '[]'), };
                    const backupObject = { appId: 'bccr-cultura-2024', version: '1.2', timestamp: new Date().toISOString(), data };
                    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(backupObject))));
                    const url = "https://default618d0a4525a646189f808f70a435ee.52.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/55564a64fead4aed9dd3e1333492c7ca/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=aOAZtCqqS0-bzffGd8yaP4vsdvz4F4Nh4-FEVLgsjoc";
                    const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ RegistroUsrCajaHerramientas: encoded }) });
                    if (!response.ok) alert("La petición se envió, pero el navegador no pudo leer la respuesta (posible error de CORS)."); else alert("¡Respaldo enviado con éxito!");
                } catch (e) { alert("Error al enviar respaldo: " + e.message); }
                finally { setIsSending(false); }
            };

            const handleSendEmailBackup = () => {
                try {
                    const data = { userName: localStorage.getItem('bccr-user-name'), division: localStorage.getItem('bccr-user-division'), email: localStorage.getItem('bccr-user-email'), points: JSON.parse(localStorage.getItem('gamification-points') || '0'), completedActivities: JSON.parse(localStorage.getItem('gamification-completed') || '[]'), badges: JSON.parse(localStorage.getItem('gamification-badges') || '[]'), goals: JSON.parse(localStorage.getItem('bccr-culture-goals') || '[]'), kudos: JSON.parse(localStorage.getItem('kudos-board') || '[]'), };
                    const backupObject = { appId: 'bccr-cultura-2024', version: '1.2', timestamp: new Date().toISOString(), data };
                    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(backupObject))));
                    if (encoded.length > 1800) { alert('Tu respaldo es muy grande para enviarlo por correo. Usa "Descargar Archivo" y adjúntalo manualmente.'); return; }
                    const subject = `Respaldo de Progreso - Ruta Cultural BCCR - ${userName}`;
                    const body = `Hola,\n\nEste es un respaldo automático de mi progreso en la Ruta Cultural BCCR.\n\n--- INICIO DEL RESPALDO (NO EDITAR) ---\n${encoded}\n--- FIN DEL RESPALDO ---`;
                    window.location.href = `mailto:alvarezcl@bccr.fi.cr?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                } catch (e) { alert("Error al generar respaldo para correo."); }
            };

            const journeyMapData = useMemo(() => pillarsData.map(p => ({ label: p.title, value: p.activities.filter(a => completedActivities.has(a.id)).length, total: p.activities.length, colorClass: p.color.replace('text', 'bg'), icon: p.icon })), [completedActivities]);
            const suggestedActivity = useMemo(() => {
                const sortedPillars = pillarsData.map(p => ({ ...p, progress: p.activities.length > 0 ? p.activities.filter(a => completedActivities.has(a.id)).length / p.activities.length : 1 })).sort((a, b) => a.progress - b.progress);
                for (const p of sortedPillars) {
                    const next = p.activities.find(a => !completedActivities.has(a.id));
                    if (next) return { activity: next, pillar: p };
                }
                return null;
            }, [completedActivities]);

            const JourneyMap = ({ progressData }) => {
                const overallProgress = useMemo(() => {
                    const totalValue = progressData.reduce((sum, item) => sum + item.value, 0);
                    const total = progressData.reduce((sum, item) => sum + item.total, 0);
                    return total > 0 ? (totalValue / total) * 100 : 0;
                }, [progressData]);
                return (
                    <div className="bg-white p-6 rounded-xl shadow-lg">
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Mi Viaje Cultural</h2>
                        <p className="text-slate-600 mb-8">Tu progreso a través de los seis ejes culturales. ¡Sigue avanzando!</p>
                        <div className="relative">
                            <div className="absolute left-4 top-4 bottom-4 w-1 bg-slate-200 rounded-full"><div className="absolute left-0 top-0 w-full bg-gradient-to-b from-blue-500 to-teal-400 rounded-full" style={{height: `${overallProgress}%`, transition: 'height 1s ease-out'}}></div></div>
                            <div className="space-y-8 relative">
                                {progressData.map(p => {
                                    const progress = p.total > 0 ? (p.value / p.total) * 100 : 0;
                                    const isCompleted = progress === 100;
                                    const isInProgress = progress > 0;
                                    return (
                                        <div key={p.label} className="relative flex items-center">
                                            <div className={`absolute left-4 -translate-x-1/2 z-10 w-9 h-9 rounded-full flex items-center justify-center ring-4 ring-white transition-all duration-300 ${isCompleted ? 'bg-green-500' : isInProgress ? p.colorClass : 'bg-slate-300'}`}>
                                                {isCompleted ? <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" /></svg> : cloneElement(p.icon, { className: `w-5 h-5 ${isInProgress ? 'text-white' : 'text-slate-500'}` })}
                                            </div>
                                            <div className="ml-12 bg-slate-50 border border-slate-200 rounded-lg shadow-sm w-full transition-shadow hover:shadow-md">
                                                 <div className="p-4"><div className="flex justify-between items-center"><h4 className="font-bold text-slate-800">{p.label}</h4><span className={`font-bold text-sm ${isCompleted ? 'text-green-600' : 'text-slate-600'}`}>{Math.round(progress)}%</span></div></div>
                                                <div className="bg-slate-200 h-2 rounded-b-lg overflow-hidden"><div className={`h-full transition-all duration-500 ${isCompleted ? 'bg-green-500' : p.colorClass.replace('text','bg')}`} style={{ width: `${progress}%` }}></div></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };
            const SuggestedActivity = ({ activity, pillar, onNavigate }) => (
                <section className="bg-gradient-to-br from-blue-50 to-purple-50 p-6 rounded-xl shadow-lg border border-slate-200">
                    <h2 className="text-2xl font-bold text-slate-800">Sugerencia para ti</h2><p className="text-slate-600 mt-1">Para seguir avanzando en tu ruta, te sugerimos esta actividad:</p>
                    <div className="mt-4 bg-white p-4 rounded-lg shadow-inner">
                        <p className="text-sm font-semibold text-purple-700 uppercase tracking-wider">{pillar.title}</p><h3 className="text-xl font-bold text-slate-900 mt-1">{activity.title}</h3><p className="text-slate-500 mt-2">{activity.description}</p>
                         <div className="mt-3 flex justify-between items-center">
                            <div className="flex items-center bg-yellow-100 text-yellow-800 text-xs font-bold px-2.5 py-1 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>{activity.points} Puntos</div>
                            <button onClick={() => onNavigate(pillar.id)} className="bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition-colors">¡Vamos! &rarr;</button>
                         </div>
                    </div>
                </section>
            );
            const Badge = ({ badge, isEarned }) => (
                <div className={`p-4 rounded-lg flex items-center space-x-4 transition-all duration-300 ${isEarned ? badge.colorClasses + ' shadow-lg' : 'bg-slate-100'}`}>
                    <div className={`flex-shrink-0 ${isEarned ? badge.iconColorClasses : 'text-slate-400'}`}>{cloneElement(badge.icon, { className: "h-12 w-12" })}</div>
                    <div className="flex-grow"><h4 className={`font-bold ${isEarned ? '' : 'text-slate-500'}`}>{badge.name}</h4><p className={`text-sm ${isEarned ? 'opacity-90' : 'text-slate-400'}`}>{badge.description}</p></div>
                    {isEarned && <div className="flex-shrink-0 opacity-70"><svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg></div>}
                </div>
            );
            return (
                <div className="space-y-12">
                    <section className="bg-white p-8 rounded-xl shadow-lg text-center"><h1 className="text-4xl font-extrabold text-slate-800">Mi Ruta Cultural</h1><p className="mt-2 text-lg text-slate-600">Este es tu centro de progreso en la transformación cultural del BCCR.</p><div className="mt-6 bg-yellow-100 text-yellow-800 inline-flex items-center text-2xl font-bold px-6 py-3 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 mr-2" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>{points} Puntos Totales</div></section>
                    {suggestedActivity && <SuggestedActivity activity={suggestedActivity.activity} pillar={suggestedActivity.pillar} onNavigate={onNavigate} />}
                    <section><JourneyMap progressData={journeyMapData} /></section>
                    <section><h2 className="text-3xl font-bold text-slate-800 mb-6">Insignias y Logros</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-5">{Object.values(BADGES).map(b => <Badge key={b.id} badge={b} isEarned={earnedBadgeIds.has(b.id)} />)}</div></section>
                    <section><h2 className="text-3xl font-bold text-slate-800 mb-6">Mi Perfil y Gestión de Datos</h2>
                        <div className="bg-white p-6 rounded-xl shadow-lg divide-y divide-slate-200">
                            <div className="py-6"><h3 className="text-xl font-bold text-slate-800">Mi Perfil</h3><div className="mt-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 p-4 bg-slate-50 rounded-lg"><div><p className="text-sm text-slate-500">Sesión iniciada como:</p><p className="font-bold text-lg text-slate-800">{userName} <span className="font-normal text-base text-slate-600">({division})</span></p><p className="text-sm text-slate-500">{email}</p></div><button onClick={logout} className="inline-flex items-center justify-center space-x-2 bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.21 3.03-1.742 3.03H4.42c-1.532 0-2.492-1.696-1.742-3.03l5.58-9.92zM10 13a1 1 0 110-2 1 1 0 010 2zm-1.75-5.25a.75.75 0 00-1.5 0v2.5a.75.75 0 001.5 0v-2.5z" clipRule="evenodd" /></svg><span>Cerrar Sesión y Reiniciar</span></button></div><p className="text-xs text-slate-500 mt-2">¡Cuidado! Esta acción borrará permanentemente todo tu progreso de este navegador.</p></div>
                            <div className="py-6"><h3 className="text-xl font-bold text-slate-800">Descargar Archivo de Respaldo (Exportar)</h3><p className="text-slate-600 mt-1 mb-4">Guarda todo tu progreso en un archivo .txt encriptado. Consérvalo para restaurarlo más tarde o en otro dispositivo.</p><button onClick={handleGenerateBackup} className="inline-flex items-center justify-center space-x-2 bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 9.707a1 1 0 011.414 0L9 11.086V3a1 1 0 112 0v8.086l1.293-1.379a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clipRule="evenodd" /></svg><span>Descargar Archivo de Respaldo</span></button></div>
                            <div className="py-6"><h3 className="text-xl font-bold text-slate-800">Restaurar Progreso (Importar)</h3><p className="text-slate-600 mt-1 mb-4">Selecciona tu archivo de respaldo (.txt) para restaurar tu progreso. Esto sobreescribirá cualquier avance actual.</p><div className="space-y-2"><label htmlFor="import-file-input" className="inline-flex items-center justify-center space-x-2 bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M4 12v1a3 3 0 003 3h6a3 3 0 003-3v-1a1 1 0 10-2 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-1a1 1 0 10-2 0zm5.293-6.707a1 1 0 00-1.414-1.414l-3 3a1 1 0 001.414 1.414L9 10.414V3a1 1 0 102 0v7.414l1.293-1.293a1 1 0 00-1.414-1.414l-3-3z" /></svg><span>Seleccionar Archivo para Restaurar</span></label><input id="import-file-input" type="file" className="hidden" accept=".txt,text/plain" onChange={handleRestoreFromFile}/></div></div>
                            <div className="py-6"><h3 className="text-xl font-bold text-slate-800">Enviar Respaldo al BCCR</h3><p className="text-slate-600 mt-1 mb-4">Envía una copia de tu respaldo directamente al BCCR para fines de análisis y seguimiento del progreso de la iniciativa.</p><button onClick={handleSendBackupToPA} disabled={isSending || Number(points) < 1} className="inline-flex items-center justify-center space-x-2 bg-slate-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-slate-700 transition-colors disabled:bg-slate-400 disabled:cursor-not-allowed"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M5.5 13a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.977A4.5 4.5 0 1113.5 13H11V9.414l-1.293 1.293a1 1 0 01-1.414-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 9.414V13H5.5z" /><path d="M9 13.25V17.5a1 1 0 01-2 0v-4.25a.75.75 0 010-1.5h6a.75.75 0 010 1.5H9z" /></svg><span>{isSending ? 'Enviando...' : 'Enviar Respaldo al BCCR'}</span></button></div>
                            <div className="py-6"><h3 className="text-xl font-bold text-slate-800">Enviar Respaldo por Correo</h3><p className="text-slate-600 mt-1 mb-4">Abre tu cliente de correo predeterminado (como Outlook) con un borrador listo para enviar tu respaldo.</p><button onClick={handleSendEmailBackup} disabled={Number(points) < 1} className="inline-flex items-center justify-center space-x-2 bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition-colors disabled:bg-slate-400 disabled:cursor-not-allowed"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" /><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" /></svg><span>Enviar Respaldo por Correo</span></button></div>

        const Resources = () => {
            const resourcesData = [ {title: "Árbol del Cambio", description: "Una guía visual para entender la conexión entre nuestros valores, comportamientos y los resultados deseados.", example: "Ejemplo: Si el VALOR es 'Colaboración', el COMPORTAMIENTO es 'Compartir información abiertamente con otros equipos', y el RESULTADO es 'Proyectos más rápidos y con menos errores'."}, {title: "Diferencia entre Clima y Cultura", description: "Un documento clave para comprender los conceptos fundamentales que guían nuestra transformación.", example: "Analogía: El Clima es como el tiempo de hoy (soleado, lluvioso), puede cambiar rápido. La Cultura es como la estación del año (verano, invierno), es más profunda y estable."}, {title: "Bitácora de Acciones de Enlaces", description: "Consulta las iniciativas y el progreso liderado por los Enlaces de Cultura en toda la organización.", example: "Busca en la bitácora para inspirarte. Por ejemplo, podrías ver que el equipo de Tesorería implementó 'reuniones de 5 minutos de reconocimiento' al inicio de la semana."}, {title: "Cápsulas de Ejes Culturales", description: "Videos cortos y dinámicos que explican cada uno de los seis ejes en detalle.", example: "¿No tienes claro el eje de Agilidad? Ve la cápsula de 2 minutos que resume sus comportamientos clave y te da ideas rápidas para aplicar hoy mismo."}, {title: "Autodiagnóstico de Seguridad Psicológica", description: "Una herramienta personal para reflexionar y evaluar el nivel de seguridad psicológica en tu entorno de trabajo.", example: "La herramienta te guiará con preguntas como: '¿Siento que puedo proponer una idea loca sin temor a la crítica?' o '¿Se comparten los errores abiertamente en mi equipo como oportunidades de aprendizaje?'."} ];
            const InteractiveResourceCard = ({ title, description, example }) => { const [isOpen, setIsOpen] = useState(false); return (<div className="bg-white rounded-lg shadow-md overflow-hidden transition-shadow duration-300 hover:shadow-lg"><button onClick={() => setIsOpen(!isOpen)} className="w-full text-left p-6 hover:bg-slate-50 transition-colors duration-200 flex justify-between items-center"><div className="pr-4"><h3 className="text-xl font-bold text-blue-700">{title}</h3><p className="mt-2 text-slate-600">{description}</p></div><svg className={`flex-shrink-0 h-6 w-6 text-slate-500 transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg></button>{isOpen && (<div className="p-6 border-t border-slate-200 bg-blue-50/50"><h4 className="font-semibold text-slate-800">En la práctica:</h4><p className="mt-2 text-slate-700">{example}</p></div>)}</div>); };

            return (<div className="space-y-12"><section className="text-center"><h1 className="text-4xl font-extrabold text-slate-800">Recursos y Apoyo</h1><p className="mt-3 max-w-2xl mx-auto text-lg text-slate-600">Aquí encontrarás materiales y contactos clave para apoyarte en tu viaje de transformación cultural.</p></section><section><h2 className="text-3xl font-bold text-slate-800 mb-6">Materiales Disponibles</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-6">{resourcesData.map(r => <InteractiveResourceCard key={r.title} {...r} />)}</div></section><section><h2 className="text-3xl font-bold text-slate-800 mb-6">¿Necesitas Ayuda?</h2><div className="bg-white p-8 rounded-xl shadow-lg"><p className="text-slate-700 mb-6">No estás solo en este proceso. Cuentas con una red de apoyo dedicada a facilitar esta transformación. ¡No dudes en contactarlos!</p><div className="space-y-4"><SupportContact role="Tus Colegas Enlaces" description="Son tu primer punto de contacto, facilitadores y campeones de la cultura en tu área." /><SupportContact role="Compañeros de División" description="Colabora con tus pares. Juntos pueden implementar actividades y apoyarse mutuamente." /><SupportContact role="Talent Advisors" description="Tus asesores de talento están para guiarte en tu desarrollo y alinearlo con la nueva cultura." /><SupportContact role="Equipo de DGT" description="El equipo de Desarrollo y Gestión del Talento Humano lidera la estrategia y puede ofrecerte recursos adicionales." /></div></div></section></div>);
        };
        const Glossary = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [activeCategory, setActiveCategory] = useState('Todos');
            const categories = ['Todos', 'Eje Cultural', 'Actividad o Práctica', 'Concepto Clave'];
            const filteredData = useMemo(() => glossaryData.filter(i => (activeCategory==='Todos' || i.category===activeCategory) && (i.term.toLowerCase().includes(searchTerm.toLowerCase()) || i.definition.toLowerCase().includes(searchTerm.toLowerCase()))).sort((a, b) => a.term.localeCompare(b.term)), [searchTerm, activeCategory]);
            const CategoryPill = ({ category }) => <span className={`px-2 py-1 text-xs font-medium rounded-full ${{'Eje Cultural': 'bg-blue-100 text-blue-800', 'Actividad o Práctica': 'bg-purple-100 text-purple-800', 'Concepto Clave': 'bg-green-100 text-green-800'}[category]}`}>{category}</span>;

                    <section className="sticky top-16 bg-slate-50/80 backdrop-blur-sm z-40 py-4 -my-4"><div className="space-y-4"><input type="search" placeholder="Busca un término..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" /><div className="flex flex-wrap gap-2 justify-center">{categories.map(c => <button key={c} onClick={() => setActiveCategory(c)} className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors duration-200 ${activeCategory === c ? 'bg-blue-600 text-white shadow' : 'bg-white text-slate-700 hover:bg-slate-200'}`}>{c}</button>)}</div></div></section>
                    <section className="mt-8">{filteredData.length > 0 ? <div className="space-y-4">{filteredData.map(item => <GlossaryItem key={item.term} item={item} />)}</div> : <div className="text-center bg-white p-8 rounded-lg shadow-md"><h3 className="text-xl font-semibold text-slate-700">No se encontraron resultados</h3><p className="text-slate-500 mt-2">Intenta ajustar tu búsqueda o filtro de categoría.</p></div>}</section>
                </div>
            );
        };

                                            <div key={stone.name} className={`p-4 rounded-2xl border border-transparent hover:border-slate-200 transition-all ${stone.bg}`}>

        const PsychologicalSafetyModule = ({ onBack }) => {
            const [step, setStep] = React.useState(1);

            const hacks = [
                { title: 'Identificar la Brecha', desc: 'Reconoce que existe una distancia entre los mapas mentales.' },
                { title: 'Adaptar el Lenguaje', desc: 'Elimina siglas técnicas o abreviaturas que puedan excluir.' },
                { title: 'Preguntas de Validación', desc: 'Pregunta: "¿Qué comprendiste de lo que acabamos de conversar?".' },
                { title: 'Agradecer el Feedback', desc: 'Convierte la crítica en aprendizaje agradeciendo honestamente.' }

                completeActivity('academy_seguridad', 50, 'Módulo: Seguridad Psicológica');

                <div className="max-w-4xl mx-auto">

                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-7-7a1 1 0 010-1.414l7-7a1 1 0 011.414 1.414L4.414 9H17a1 1 0 110 2H4.414l5.293 5.293a1 1 0 010 1.414z" clipRule="evenodd" /></svg> Volver a la Academia

                                        <h3 className="text-2xl font-bold mb-4">Fomentar la Participación</h3>
                                        <ul className="space-y-4 text-slate-300">
                                            <li className="flex items-start gap-3"><svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-emerald-400 flex-shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg><span>Invita activamente a alguien callado a participar en tu próxima reunión.</span></li>

                                </div>

                    </div>
                </div>
